<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise Day</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            text-align: center;
            padding: 50px;
            margin: 0;
            animation: fadeIn 2s ease-in;
        }
        h1 {
            color: #ff4081;
            font-size: 3em;
            opacity: 0;
            animation: fadeInText 2s ease-in forwards 1s;
        }
        .message {
            background-color: #ffcccb;
            padding: 20px;
            border-radius: 10px;
            font-size: 1.5em;
            color: #333;
            margin: 20px;
            opacity: 0;
            animation: fadeInText 2s ease-in forwards 2s;
        }
        .promise {
            color: #d81b60;
            font-size: 2em;
            font-weight: bold;
        }
        button {
            background-color: #ff4081;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            border-radius: 5px;
            opacity: 0;
            animation: fadeInText 2s ease-in forwards 3s;
        }
        button:hover {
            background-color: #e31e5f;
            transform: scale(1.1);
            transition: transform 0.3s ease-in-out;
        }

        /* Keyframe Animations */
        @keyframes fadeIn {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }

        @keyframes fadeInText {
            0% {
                opacity: 0;
            }
            100% {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>Happy Promise Day My Dear Baale!</h1>
    <div class="message">
        <p>On this special day, let's cherish the promises we make to each other.</p>
        <p class="promise">More than the moon,I want you .More than the water,I want you. More than roses,I want you , And more than me,I want you.</p><br>
        <p class="promise">Happy Promise Day</p>
    </div>
    <button onclick="alert('You made a promise! Stay true to it.')">Make a Promise</button>
</body>
</html>
